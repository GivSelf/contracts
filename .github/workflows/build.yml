name: Build Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: bufbuild/buf-setup-action@v1

      - run: npm ci

      - name: Lint protos
        run: buf lint

      - name: Generate TypeScript
        run: PATH="$PWD/node_modules/.bin:$PATH" buf generate

      - name: Pack tarball
        run: npm run pack

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: givself-contracts
          path: givself-contracts-0.2.0.tgz
